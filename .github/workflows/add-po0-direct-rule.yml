name: Add po0.com direct rule

on:
  push:
    paths:
      - '.github/workflows/add-po0-direct-rule.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Add po0.com direct rules and bump versions
        shell: python
        run: |
          from pathlib import Path

          version = 'v2026.07.08-1'
          date = '2026/7/8'

          clash_files = {
              Path('clash/clash-all.yaml'): 'clash-all',
              Path('clash/clash4me.yaml'): 'clash4me',
          }

          for path, template_name in clash_files.items():
              text = path.read_text(encoding='utf-8')
              lines = text.splitlines()
              start = next(i for i, line in enumerate(lines) if line.strip() == 'sniffer:')
              lines = [
                  '# Clash / mihomo 配置模板（Sub-Store 调用版）',
                  f'# Template: {template_name}',
                  f'# Version: {version}',
                  f'# Date: 修改于 {date}',
                  '',
              ] + lines[start:]
              rule = '  - "DOMAIN-SUFFIX,po0.com,🎯 全球直连"'
              if not any('DOMAIN-SUFFIX,po0.com' in line for line in lines):
                  index = next(i for i, line in enumerate(lines) if 'DOMAIN-SUFFIX,066655.xyz' in line)
                  lines.insert(index + 1, rule)
              path.write_text('\n'.join(lines) + '\n', encoding='utf-8')

          loon = Path('loon/loon.conf')
          lines = loon.read_text(encoding='utf-8').splitlines()
          lines = [f'# Date: 根据可莉版本合并自身需求修改于 {date}' if x.startswith('# Date:') else f'# Version: {version}' if x.startswith('# Version:') else x for x in lines]
          if not any('DOMAIN-SUFFIX, po0.com' in x for x in lines):
              index = next(i for i, x in enumerate(lines) if x.strip().startswith('DOMAIN-SUFFIX, 066655.xyz'))
              lines.insert(index + 1, 'DOMAIN-SUFFIX, po0.com, DIRECT')
          loon.write_text('\n'.join(lines) + '\n', encoding='utf-8')

          for file in ['README.md', 'loon/README.md']:
              p = Path(file)
              if p.exists():
                  p.write_text(p.read_text(encoding='utf-8').replace('v2026.06.29-1', version), encoding='utf-8')

      - name: Commit changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add clash/clash-all.yaml clash/clash4me.yaml loon/loon.conf README.md loon/README.md
          if git diff --cached --quiet; then
            echo 'No changes to commit.'
          else
            git commit -m 'Add po0.com direct rules and bump templates to v2026.07.08-1'
            git push
          fi

# Updated 2026/7/8
