  # 国内 IP / ASN 直连
  - "GEOIP,CN,🎯 全球直连"
  - "RULE-SET,ASN-CN,🎯 全球直连"

  # 无域名纯 IP：进入专用策略组，可选 REJECT-DROP 或固定污染出口
  - "AND,((NOT,((DOMAIN-REGEX,^.+$))),(IP-CIDR,0.0.0.0/0,no-resolve)),🕳 纯IP黑洞节点"
  - "AND,((NOT,((DOMAIN-REGEX,^.+$))),(IP-CIDR6,::/0,no-resolve)),🕳 纯IP黑洞节点"

