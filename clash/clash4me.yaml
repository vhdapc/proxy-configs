  - "IP-ASN,62041,📲 电报消息,no-resolve"
  - "IP-ASN,59930,📲 电报消息,no-resolve"
  - "IP-ASN,44907,📲 电报消息,no-resolve"
  - "IP-ASN,211157,📲 电报消息,no-resolve"
  - "IP-ASN,62014,📲 电报消息,no-resolve"
  
  # Google / YouTube (防止极端情况下的纯IP回源)
