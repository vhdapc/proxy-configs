  # === 机场节点 (Emby专用) ===
  - name: ✈️ 机场节点
    include-all: true
    # 只抓取带有 BGP 或 NF 的机场节点
    filter: (?i)BGP|NF
    # 极其重要：务必把 10倍率 的应急节点排除掉，防止看视频流量暴走
    exclude-filter: 应急|10X|10倍率|V3
    type: url-test
    interval: 300
    tolerance: 50

  # === 自建区域组 ===
  - name: 🇭🇰 香港节点
    include-all: true
    filter: (?i)港|HK|hk|Hong Kong|HongKong|hongkong
    # 排除所有机场特征：BGP、NF 以及那个特殊的应急节点
    exclude-filter: (?i)BGP|NF|应急
    type: url-test
    interval: 300
    tolerance: 50

  - name: 🇯🇵 日本节点
    include-all: true
    filter: (?i)日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan
    exclude-filter: (?i)BGP|NF|应急|Native|Zouter|原生
    type: url-test
    interval: 300
    tolerance: 50

  - name: 🇺🇲 美国节点
    include-all: true
    filter: (?i)美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States
    exclude-filter: (?i)BGP|NF|应急
    type: url-test
    interval: 300
    tolerance: 50

