rules:
  #正常规则
  - "RULE-SET,LocalAreaNetwork,🎯 全球直连"
  # 👇 [关键优化] BT/PT/P2P下载必须放在最高优先级强制直连，防止封号！
  - "RULE-SET,Download,🎯 全球直连"
  
  # >>> 核心修改：放行 Nikki 自身的 DNS 查询请求 (DNS VIP通道) <<<
  - "IP-CIDR,1.1.1.1/32,🚀 手动切换,no-resolve"
  - "IP-CIDR,8.8.8.8/32,🚀 手动切换,no-resolve"
  - "IP-CIDR,223.5.5.5/32,🎯 全球直连,no-resolve"
  - "IP-CIDR,223.6.6.6/32,🎯 全球直连,no-resolve"
  - "IP-CIDR,1.12.12.12/32,🎯 全球直连,no-resolve"
  
  # 优先放行主机 IP：PS5 和 Xbox 的所有流量（包含 STUN），直连或走特定游戏节点
  - 'SRC-IP-CIDR,192.168.6.64/27,🎮 游戏平台'
  
  # 微信优先直连，避免被 STUN/UDP 规则误伤
  - "RULE-SET,WeChat,🎯 全球直连"
  # 可选：如果微信仍然卡，再打开 Tencent
  # - "RULE-SET,Tencent,🎯 全球直连"
  
  #禁止QUIC，放在首位确保优先级最高，不经过任何分流直接拒绝，迫使流量瞬间回退到 TCP
  #- AND,((OR,((DST-PORT,443),(DST-PORT,8443))),(NETWORK,UDP)),REJECT
  # 禁止海外 QUIC：国内 UDP/443 保留，海外 UDP/443/8443 拒绝，迫使海外流量回落 TCP
  - "AND,((NETWORK,UDP),(OR,((DST-PORT,443),(DST-PORT,8443))),(NOT,((GEOIP,CN)))),REJECT"  
  
  #webrtc，防止泄露
  - DOMAIN-KEYWORD,stun,REJECT
  - DST-PORT,3478,REJECT
  - DST-PORT,19302,REJECT
  
  #AdGuard
  - DOMAIN,injections.adguard.org,🚀 节点选择
  - DOMAIN,local.adguard.org,REJECT
  
  
  ##封禁OpenAI的udp流量
  #- AND,((DOMAIN-SUFFIX,chatgpt.com),(NETWORK,UDP)),REJECT
  #- AND,((DOMAIN-SUFFIX,openai.com),(NETWORK,UDP)),REJECT
  #- AND,((DOMAIN-SUFFIX,oaistatic.com),(NETWORK,UDP)),REJECT
  #- AND,((DOMAIN-SUFFIX,oaiusercontent.com),(NETWORK,UDP)),REJECT

  # --- AI系 ---
  - "RULE-SET,Gemini,💬 GoogleAI"
  - "RULE-SET,OpenAi,💬 GoogleAI"
  - "RULE-SET,ai,💬 GoogleAI"
  
  
  ##Duolingo
  - "RULE-SET,Duolingo,🚀 手动切换"
  
  # --- Google系 ---
  - "RULE-SET,GoogleVoice,🇺🇲 美国节点"
  - "RULE-SET,YouTube,📹 油管视频"
  - "RULE-SET,GoogleFCM,📢 谷歌FCM"
  - "RULE-SET,Google,💬 GoogleAI"

  # --- Apple系 ---
  - "RULE-SET,AppleTV,📺 苹果影视"
