##clash配置模板，修改自用版本，修改于26/6/24 17:36

# --- 嗅探器配置 (放置在这里) ---
sniffer:
  enable: true
  parse-pure-ip: true
  override-destination: false #暂时调节成false，观察一下
  sniff:
    HTTP:
      ports: [80, 8080-8880, 2052]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - 'geosite:cn'
    - 'geosite:apple'
    - '+.mobaiemby.site'
    - '+.uhdnow.com'
  skip-dst-address:
    - 'geoip:cn'
    
    


proxy-groups:
      
  - name: 🚀 节点选择
    type: fallback
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    proxies:
      - 🌱 原生节点
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      - 🇭🇰 香港节点
 
  - name: 🌐 国外通用
    type: select
    proxies:
      - 🇯🇵 日本节点
      - 🇭🇰 香港节点
      - 🇺🇲 美国节点
      - 🚀 手动切换
      
  - name: 🌱 原生节点
    include-all: true
    filter: (?i)^Native-Zouter-(RFC|KFC)$
    type: url-test
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50
      
  - name: 🚀 手动切换
    include-all: true
    exclude-filter: (?i)应急|10X|10倍率|V3
    type: select
    
  - name: ♻️ 自动选择
    type: url-test
    include-all: true
    exclude-filter: (?i)应急|10X|10倍率|V3
    interval: 300
    tolerance: 50
    
  - name: 📺 Emby观影
    type: select
    proxies:
      - ✈️ 机场节点             # 刚才我们过滤出的机场 NF/BGP 组
      - 🇺🇲 美国节点             # 你的美西三网优化线路（自建）
      - 🇯🇵 日本节点             # 你的 JP 专线（自建）
      - 🇭🇰 香港节点
      - 🚀 手动切换
      - DIRECT                 # 直连（如果你在本地做了 CF 优选 IP 劫持，选这个）
      
  - name: 📲 电报消息
    type: select
    proxies:
      - 🚀 节点选择
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      - 🇭🇰 香港节点
     # - 🇨🇳 台湾节点
     # - 🇸🇬 狮城节点
     # - 🇰🇷 韩国节点
      - 🚀 手动切换
      - ✈️ 机场节点

  - name: 💬 GoogleAI
    type: select
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    proxies:
      - 🚀 节点选择    
      - 🌱 原生节点
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      - 🇭🇰 香港节点
     # - 🇨🇳 台湾节点
     # - 🇸🇬 狮城节点
     # - 🇰🇷 韩国节点
      - 🚀 手动切换
      - ✈️ 机场节点

  - name: 📹 油管视频
    type: select
    proxies:
      - 🚀 节点选择
      - 🇭🇰 香港节点
      #- 🇨🇳 台湾节点
      #- 🇸🇬 狮城节点
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      #- 🇰🇷 韩国节点
      - ✈️ 机场节点
      - 🚀 手动切换

  - name: 🛑 广告拦截
    type: select
    proxies:
      - PASS
      - REJECT-DROP
      - REJECT        # 选这个：开启广告拦截（直接丢弃数据包）
      - DIRECT        # 选这个：关闭广告拦截（让广告数据包直连通过）
      
  - name: 🎥 奈飞视频
    type: select
    proxies:
