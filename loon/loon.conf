# ==================================================
# 主自动策略：按你的偏好顺序 fallback
# 原生 > 日本 > 美国 > 香港
# ==================================================

自动代理策略=fallback, 原生时延优选, 日本时延优选, 美国时延优选, 香港时延优选, interval=60, max-timeout=2000, img-url=https://github.com/shindgewongxj/WHATSINStash/raw/main/icon/fallback.png


国外通用策略=select, 日本时延优选, 香港时延优选, 美国时延优选, 手动选择策略, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/Global.png

# 手动兜底：出问题时临时切换
手动选择策略=select, 自动代理策略, 原生时延优选, 日本时延优选, 美国时延优选, 香港时延优选, 其他时延优选, 机场时延优选, 游戏时延优选, DIRECT, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/Global.png

# Emby：默认优先机场，其次美国、日本，最后自动兜底 / DIRECT
